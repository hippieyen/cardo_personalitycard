<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你的人格卡 – Cardo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  min-height:100%;
  background:#06090f;
  font-family:'Noto Serif TC',serif;
  overflow-x:hidden;
}

/* ─── Full-page bg starfield ─── */
#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ══════════════════════════════
   LOADING SCREEN
══════════════════════════════ */
#loading{
  position:fixed;inset:0;z-index:200;
  background:#06090f;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  transition:opacity 0.9s ease,visibility 0.9s ease;
}
#loading.out{opacity:0;visibility:hidden;pointer-events:none;}

.orbit{position:relative;width:120px;height:120px;margin-bottom:36px;}
.ring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid transparent;
  animation:spin 2.4s linear infinite;
}
.ring:nth-child(1){border-top-color:#dab641;border-right-color:rgba(218,182,65,0.15);animation-duration:2.4s;}
.ring:nth-child(2){inset:14px;border-top-color:#2dd4bf;border-left-color:rgba(45,212,191,0.15);animation-direction:reverse;animation-duration:1.8s;}
.ring:nth-child(3){inset:28px;border-top-color:rgba(218,182,65,0.5);animation-duration:3.2s;}
.ring-moon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.ring-moon svg{
  animation:moonpulse 2s ease-in-out infinite;
  filter:drop-shadow(0 0 8px rgba(242,212,98,.9));
}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes moonpulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(242,212,98,.9));transform:scale(1);}
  50%{filter:drop-shadow(0 0 20px rgba(242,212,98,1)) drop-shadow(0 0 34px rgba(218,182,65,.5));transform:scale(1.1);}
}

.load-title{
  font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:.28em;
  color:rgba(218,182,65,.65);
  text-transform:uppercase;
  margin-bottom:18px;
}
.dots{display:flex;gap:7px;}
.dots span{
  width:5px;height:5px;border-radius:50%;
  background:#dab641;
  animation:blink 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{
  0%,100%{opacity:.2;transform:scale(.8);}
  50%{opacity:1;transform:scale(1.35);}
}

/* ══════════════════════════════
   RESULT PAGE
══════════════════════════════ */
#result{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:48px 20px 64px;
  opacity:0;visibility:hidden;
}
#result.show{
  opacity:1;visibility:visible;
  transition:opacity 1s ease;
}

/* Top labels */
.reveal-eyebrow{
  font-family:'Cinzel',serif;
  font-size:10.5px;letter-spacing:.38em;
  color:rgba(218,182,65,.5);
  text-transform:uppercase;
  margin-bottom:8px;
  opacity:0;transform:translateY(14px);
  transition:opacity .7s ease .15s,transform .7s ease .15s;
}
.reveal-eyebrow.in{opacity:1;transform:translateY(0);}

.reveal-heading{
  font-family:'Noto Serif TC',serif;
  font-size:16px;font-weight:400;
  color:rgba(232,234,246,.55);
  letter-spacing:.12em;
  margin-bottom:36px;
  opacity:0;transform:translateY(14px);
  transition:opacity .7s ease .35s,transform .7s ease .35s;
}
.reveal-heading.in{opacity:1;transform:translateY(0);}

/* ── CARD STAGE ── */
.stage{
  perspective:1000px;
  position:relative;
  margin-bottom:44px;
}

/* Outer glow aura */
.card-aura{
  position:absolute;
  inset:-24px;
  border-radius:48px;
  background:radial-gradient(ellipse,rgba(45,212,191,.10) 0%,transparent 70%);
  opacity:0;
  transition:opacity 1.2s ease 1.4s;
  pointer-events:none;
}
.card-aura.in{opacity:1;}

/* The card itself */
.card{
  position:relative;
  width:340px;height:590px;
  border-radius:24px;
  overflow:hidden;
  box-shadow:
    0 0 0 1.5px rgba(218,182,65,.95),
    0 0 0 7px rgba(218,182,65,.06),
    0 44px 88px rgba(0,0,0,.9),
    0 10px 28px rgba(0,0,0,.55);
  opacity:0;
  transform:translateY(72px) rotateX(10deg) scale(.9);
  transition:
    opacity 1.1s cubic-bezier(.15,0,.15,1) .55s,
    transform 1.3s cubic-bezier(.15,0,.1,1) .55s,
    box-shadow 1.1s ease .55s;
}
.card.in{
  opacity:1;
  transform:translateY(0) rotateX(0) scale(1);
  box-shadow:
    0 0 0 1.5px rgba(218,182,65,.95),
    0 0 0 7px rgba(218,182,65,.06),
    0 44px 88px rgba(0,0,0,.9),
    0 10px 28px rgba(0,0,0,.55),
    0 0 70px rgba(218,182,65,.07);
}
/* Inner gold border */
.card::after{
  content:'';position:absolute;inset:6px;
  border-radius:18px;
  border:.7px solid rgba(218,182,65,.38);
  z-index:40;pointer-events:none;
}

/* Dark overlay to deepen the card */
.card-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(180deg,
      rgba(4,9,22,.38) 0%,
      rgba(4,9,22,.12) 40%,
      rgba(4,9,22,.22) 65%,
      rgba(4,9,22,.55) 100%
    );
  z-index:1;
}

/* Stars inside card */
.card-stars{position:absolute;inset:0;z-index:2;}

/* Card layout */
.card-body{
  position:relative;z-index:10;
  width:100%;height:100%;
  display:flex;flex-direction:column;
}

/* ── TOP section ── */
.card-top{
  flex:1.1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding-top:14px;
}

.moon-svg{
  margin-bottom:10px;
  filter:drop-shadow(0 0 9px rgba(242,212,98,.9)) drop-shadow(0 0 22px rgba(200,155,35,.5));
  opacity:0;transform:scale(.55) translateY(-12px);
  transition:opacity .8s ease 1.15s,transform .85s cubic-bezier(.2,0,.2,1) 1.15s;
}
.moon-svg.in{opacity:1;transform:scale(1) translateY(0);}

.card-name{
  font-family:'Noto Serif TC',serif;
  font-size:34px;font-weight:700;
  color:#f2d462;
  letter-spacing:5px;
  text-shadow:0 0 16px rgba(245,210,70,.7),0 0 32px rgba(200,155,30,.35);
  margin-bottom:7px;text-align:center;
  opacity:0;transform:translateY(16px);
  transition:opacity .7s ease 1.45s,transform .7s ease 1.45s;
}
.card-name.in{opacity:1;transform:translateY(0);}

.name-rule{
  width:80px;height:.9px;
  background:linear-gradient(to right,transparent,rgba(218,182,65,.9),transparent);
  margin:0 auto 6px;
  opacity:0;transform:scaleX(0);
  transition:opacity .5s ease 1.75s,transform .55s ease 1.75s;
}
.name-rule.in{opacity:1;transform:scaleX(1);}

.card-sub{
  font-family:'Cinzel',serif;
  font-size:10px;color:rgba(218,182,65,.65);
  letter-spacing:3.5px;
  opacity:0;transition:opacity .6s ease 1.95s;
}
.card-sub.in{opacity:1;}

/* ── MIDDLE section – radar ── */
.card-mid{
  flex:1.35;
  display:flex;align-items:center;justify-content:center;
}

.chart-wrap{
  position:relative;
  width:260px;height:230px;
  opacity:0;transform:scale(.82);
  transition:opacity .9s ease 2.05s,transform .9s cubic-bezier(.2,0,.2,1) 2.05s;
}
.chart-wrap.in{opacity:1;transform:scale(1);}

.radar-lbl{
  position:absolute;
  font-family:'Noto Serif TC',serif;
  font-size:11px;font-weight:500;
  color:#eece70;
  text-shadow:0 0 7px rgba(240,200,80,.65);
  white-space:nowrap;
  transform:translate(-50%,-50%);
}

/* ── BOTTOM section ── */
.card-bot{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:6px 24px 20px;
}

.card-desc{
  font-family:'Noto Serif TC',serif;
  font-size:12.5px;line-height:1.9;
  color:#e0d0b0;text-align:center;
  text-shadow:0 1px 6px rgba(0,0,0,.95);
  opacity:0;transform:translateY(12px);
  transition:opacity .7s ease 2.6s,transform .7s ease 2.6s;
}
.card-desc.in{opacity:1;transform:translateY(0);}

/* Radar draw animation */
#data-poly{
  stroke-dasharray:700;stroke-dashoffset:700;
  animation:drawpoly 1.3s cubic-bezier(.4,0,.2,1) 2.15s forwards;
}
#data-fill{opacity:0;animation:fadein .8s ease 3.1s forwards;}
.vdot{opacity:0;animation:popdot .4s cubic-bezier(.2,0,.2,1) forwards;}
@keyframes drawpoly{to{stroke-dashoffset:0;}}
@keyframes fadein{to{opacity:1;}}
@keyframes popdot{
  0%{opacity:0;transform-origin:center;transform:scale(0);}
  70%{transform:scale(1.5);}
  100%{opacity:1;transform:scale(1);}
}

/* ── CTA ── */
.shimmer{
  width:1px;height:44px;
  background:linear-gradient(to bottom,transparent,rgba(218,182,65,.45),transparent);
  margin:0 auto;
  opacity:0;transition:opacity .6s ease 2.95s;
}
.shimmer.in{opacity:1;}

.cta{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  opacity:0;transform:translateY(22px);
  transition:opacity .7s ease 3.05s,transform .7s ease 3.05s;
}
.cta.in{opacity:1;transform:translateY(0);}

.cta-hint{
  font-family:'Cinzel',serif;
  font-size:10.5px;letter-spacing:.22em;
  color:rgba(218,182,65,.4);
}

.btn-start{
  position:relative;
  padding:15px 54px;
  border-radius:50px;
  border:1.5px solid rgba(218,182,65,.65);
  background:linear-gradient(135deg,rgba(218,182,65,.12),rgba(45,212,191,.06));
  color:#f2d462;
  font-family:'Noto Serif TC',serif;
  font-size:15px;font-weight:700;
  letter-spacing:.14em;cursor:pointer;
  overflow:hidden;
  transition:all .35s ease;
}
.btn-start::before{
  content:'';position:absolute;inset:0;

<script>
// ── BG STARFIELD ──
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  function resize(){
    W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    stars=Array.from({length:160},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.3+.2,a:Math.random()*.5+.12,
      sp:Math.random()*.005+.002,ph:Math.random()*Math.PI*2,
      is4:Math.random()>.85
    }));
  }
  function d4(x,y,s,a){
    ctx.save();ctx.globalAlpha=a;
    ctx.strokeStyle='rgba(255,248,195,1)';ctx.lineCap='round';
    ctx.lineWidth=s*.7;
    ctx.beginPath();ctx.moveTo(x-s*3,y);ctx.lineTo(x+s*3,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-s*3);ctx.lineTo(x,y+s*3);ctx.stroke();
    ctx.lineWidth=s*.3;
    ctx.beginPath();ctx.moveTo(x-s*2,y-s*2);ctx.lineTo(x+s*2,y+s*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+s*2,y-s*2);ctx.lineTo(x-s*2,y+s*2);ctx.stroke();
    ctx.restore();
  }
  let t=0;
  (function loop(){
    ctx.clearRect(0,0,W,H);t++;
    stars.forEach(s=>{
      const a=s.a*(.3+.7*Math.sin(t*s.sp+s.ph));
      if(s.is4)d4(s.x,s.y,s.r+.6,a);
      else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,228,255,${a})`;ctx.fill();}
    });
    requestAnimationFrame(loop);
  })();
  window.addEventListener('resize',resize);resize();
})();

// ── CARD STARFIELD ──
(function(){
  const c=document.getElementById('cstars');
  const ctx=c.getContext('2d');
  const W=340,H=590;
  const stars=Array.from({length:65},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*.9+.15,a:Math.random()*.45+.1,
    sp:Math.random()*.006+.003,ph:Math.random()*Math.PI*2
  }));
  let t=0;
  (function loop(){
    ctx.clearRect(0,0,W,H);t++;
    stars.forEach(s=>{
      const a=s.a*(.3+.7*Math.sin(t*s.sp+s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,238,255,${a})`;ctx.fill();
    });
    requestAnimationFrame(loop);
  })();
})();

// ── REVEAL ──
function reveal(){
  const r=document.getElementById('result');
  r.classList.add('show');
  function add(id,delay){setTimeout(()=>document.getElementById(id).classList.add('in'),delay);}
  add('ey',150);
  add('rh',350);
  add('aura',550);
  add('card',550);
  add('cmoon',1150);
  add('cname',1450);
  add('nrule',1750);
  add('csub',1950);
  add('cwrap',2050);
  add('cdesc',2600);
  add('shimmer',2950);
  add('cta',3050);
}

// ── LOAD SEQUENCE ──
window.addEventListener('DOMContentLoaded',()=>{
  // Read quiz answers from sessionStorage (for personality logic)
  let answers={};
  try{ const r=sessionStorage.getItem('cardo_quiz_answers'); if(r) answers=JSON.parse(r); }catch(e){}

  // After 2.4s loading, fade out and reveal card
  setTimeout(()=>{
    document.getElementById('loading').classList.add('out');
    setTimeout(reveal, 500);
  }, 2400);
});

function enterApp(){
  window.location.href='cardo_main.html';
}
</script>
